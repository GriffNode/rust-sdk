name: Generate SDK
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['openapi.yaml', 'openapitools.json', '.github/workflows/generate.yml']
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate (rust)
        run: |
          docker run --rm -v "${{ github.workspace }}:/local" \
            openapitools/openapi-generator-cli:v7.10.0 \
            generate -i /local/openapi.yaml -g rust -o /local \
            --skip-validate-spec \
            --additional-properties=packageName=griffnode,packageVersion=0.1.0,library=reqwest
      - name: Fix Cargo.toml metadata (generator has no URL properties)
        run: |
          sed -i 's#^authors = .*#authors = ["GriffNode <dev@griffnode.com>"]#' Cargo.toml
          sed -i 's#^description = .*#description = "Official GriffNode SDK. Non-custodial crypto payment gateway: accept BTC, ETH, LTC, DOGE, DASH and ERC-20 tokens straight to your own wallet."#' Cargo.toml
          grep -q '^homepage' Cargo.toml     || sed -i '/^license/i homepage = "https://griffnode.com"' Cargo.toml
          grep -q '^repository' Cargo.toml   || sed -i '/^license/i repository = "https://github.com/GriffNode/rust-sdk"' Cargo.toml
          grep -q '^documentation' Cargo.toml|| sed -i '/^license/i documentation = "https://docs.griffnode.com/reference"' Cargo.toml
      - name: Commit regenerated SDK
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: regenerate SDK from openapi.yaml"
          git pull --rebase --autostash
          git push
